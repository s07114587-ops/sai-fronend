<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="google-site-verification" content="bPlFVhR9cKzjkQqC2gry25JcQFJasdVM0U4biOUw1fo" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>s ai Pro - World's Most Private AI</title>
    <style>
        /* CSS এর সাথে মোবাইলের জন্য ফিক্সড ইনপুট এরিয়া */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: url('1.png') no-repeat center center fixed; background-size: cover; color: #ffffff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        @media (max-width: 768px) {
            body { background: url('0.png') no-repeat center center fixed; background-size: cover; }
            .input-area { position: fixed !important; bottom: 0; left: 0; width: 100%; z-index: 1000; background: rgba(0, 0, 0, 0.8) !important; }
            .chat-container { padding-bottom: 100px !important; }
        }

        .top-ribbon { display: flex; justify-content: space-between; align-items: center; padding: 8px 20px; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.1); font-size: 13px; z-index: 10; }
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: rgba(11, 15, 25, 0.4); }
        .message { max-width: 80%; padding: 12px 18px; border-radius: 18px; font-size: 15px; background: rgba(0, 0, 0, 0.6); align-self: flex-start; }
        .user-msg { background: linear-gradient(135deg, #533190 0%, #3e1e75 100%); align-self: flex-end; }
        
        .welcome-box { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: auto; text-align: center; max-width: 600px; padding: 20px; }
        .prompt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-top: 20px; }
        .prompt-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 14px; border-radius: 12px; cursor: pointer; text-align: left; }
        
        .input-area { display: flex; padding: 15px 20px; background: rgba(0, 0, 0, 0.6); gap: 10px; align-items: center; }
        input[type="text"] { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 15px; border-radius: 25px; outline: none; }
    </style>
</head>
<body>

    <div class="top-ribbon">
        <span style="color:#a072ff; font-weight:bold;">s ai Pro</span>
    </div>

    <div class="chat-container" id="chat-box">
        <div class="welcome-box" id="welcome-screen">
            <button onclick="this.parentElement.style.display='none'" style="background:transparent; border:1px solid #a072ff; color:#a072ff; padding:5px 15px; border-radius:15px; cursor:pointer; margin-bottom:15px;">✕ Close</button>
            <h2>Welcome to s ai Pro</h2>
            <div class="prompt-grid">
                <button class="prompt-btn" onclick="userInput.value='Draw a cat'; sendMessage()">🎨 Draw a Cat</button>
                <button class="prompt-btn" onclick="userInput.value='Tell a joke'; sendMessage()">😂 Tell a Joke</button>
            </div>
        </div>
        <div id="loading" style="display:none; color:#a072ff;">s ai Pro thinking... ⚡</div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask anything...">
        <button onclick="sendMessage()" style="background:#a072ff; border:none; padding:10px 20px; border-radius:20px; color:white; cursor:pointer;">➤</button>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const loading = document.getElementById('loading');

        function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            // ইউজার মেসেজ
            const msg = document.createElement('div');
            msg.className = 'message user-msg';
            msg.innerText = text;
            chatBox.appendChild(msg);
            
            userInput.value = '';
            loading.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            // সিমুলেশন (তুমি এখানে তোমার রেন্ডার ব্যাকএন্ড কল করবা)
            setTimeout(() => {
                loading.style.display = 'none';
                const aiMsg = document.createElement('div');
                aiMsg.className = 'message';
                aiMsg.innerText = "I'm thinking... (Backend integrated)";
                chatBox.appendChild(aiMsg);
            }, 1000);
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link class="favicon" rel="icon" type="image/png" href="111.png">
    <title>s ai Pro - World's Most Private AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;600;700&display=swap');
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        /* 🎯 Desktop Background (1.png) */
        body { 
            background: url('1.png') no-repeat center center fixed; 
            background-size: cover;
            color: #ffffff; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            transition: background 0.5s ease; /* Smooth transition for theme changer */
        }
        
        /* 🎯 Mobile Background (0.png) */
        @media (max-width: 768px) {
            body { background: url('0.png') no-repeat center center fixed; background-size: cover; }
        }
        
        /* 🎀 Slim Top Ribbon Design */
        .top-ribbon {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            z-index: 10;
        }
        .ribbon-left, .ribbon-right { display: flex; align-items: center; gap: 15px; }
        .brand-name { color: #a072ff; font-weight: bold; font-size: 15px; letter-spacing: 1px;}
        
        /* Theme Selector & Ribbon Buttons */
        select, .ribbon-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4px 10px;
            border-radius: 15px;
            outline: none;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }
        select:hover, .ribbon-btn:hover { background: #6f42c1; }
        select option { background: #1a1a1a; color: white; }
        .privacy-link { color: #ccc; text-decoration: none; font-size: 12px; }
        .privacy-link:hover { color: #a072ff; text-decoration: underline; }

        /* Chat Container */
        .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; background: rgba(11, 15, 25, 0.4); }
        .message { max-width: 80%; padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .user-msg { background: linear-gradient(135deg, #533190 0%, #3e1e75 100%); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); align-self: flex-start; border-bottom-left-radius: 4px; backdrop-filter: blur(5px); }
        .typing-indicator { display: none; align-self: flex-start; padding: 12px 18px; background: rgba(0, 0, 0, 0.6); border-radius: 15px; color: #a072ff; font-size: 14px; font-weight: 600; border-bottom-left-radius: 4px; border: 1px solid rgba(160, 114, 255, 0.2); }
        
        /* Input Area */
        .input-area { display: flex; padding: 15px 20px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); gap: 10px; align-items: center; }
        .input-area input[type="text"] { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 15px; border-radius: 25px; outline: none; font-size: 15px; }
        .input-area input[type="text"]:focus { border-color: #6f42c1; background: rgba(255, 255, 255, 0.1); }
        .icon-btn { background: none; border: none; color: #a072ff; font-size: 22px; cursor: pointer; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .icon-btn:hover { background: #6f42c1; color: white; }
    </style>
</head>
<body>

    <div class="top-ribbon">
        <div class="ribbon-left">
            <span class="brand-name">s ai Pro</span>
            <select id="theme-selector">
                <option value="default">🌌 Default Theme</option>
                <option value="hacker">💻 Hacker Mode</option>
                <option value="dark">🌙 Dark Mode</option>
            </select>
        </div>
        <div class="ribbon-right">
            <button id="mute-btn" class="ribbon-btn">🔊 Sound On</button>
            <a href="#" class="privacy-link" onclick="alert('Privacy Policy: Your data is 100% safe. s ai Pro respects your privacy!')">Privacy Policy</a>
        </div>
    </div>
    <div class="chat-container" id="chat-box">
        <div class="typing-indicator" id="loading">s ai Pro thinking... ⚡</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask s ai Pro anything (100K Traffic Load Ready)...">
        <button class="icon-btn" id="send-btn">➤</button>
    </div>

    <script>
        // 🔗 Your Render Backend URL 🚀
        const RENDER_BACKEND_URL = "https://si-bakend.onrender.com"; 

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loading = document.getElementById('loading');
        
        // Mute Button Logic 🔇
        let isMuted = false;
        const muteBtn = document.getElementById('mute-btn');
        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            muteBtn.innerText = isMuted ? "🔇 Muted" : "🔊 Sound On";
            if(isMuted) window.speechSynthesis.cancel(); // Stops ongoing speech immediately
        });

        // Theme Changer Logic 🎨
        document.getElementById('theme-selector').addEventListener('change', function() {
            if(this.value === 'default') {
                document.body.style.background = "url('1.png') no-repeat center center fixed";
                document.body.style.backgroundSize = "cover";
            } else if(this.value === 'hacker') {
                document.body.style.background = "#0d1117"; // GitHub Hacker Dark Style
            } else if(this.value === 'dark') {
                document.body.style.background = "#000000"; // Deep Pitch Black
            }
        });

        userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });
        sendBtn.addEventListener('click', () => { sendMessage(); });

        // Function to display normal text messages
        function appendMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerText = text;
            chatBox.insertBefore(msgDiv, loading);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // Function to display generated images 🖼️
        function appendImageMessage(imageUrl) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message ai-msg';
            msgDiv.innerHTML = `<img src="${imageUrl}" alt="Generated by s ai Pro" style="max-width:100%; border-radius:10px; display:block; border: 2px solid #a072ff;">`;
            chatBox.insertBefore(msgDiv, loading);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim(); if (!text) return;
            appendMessage(text, true);
            userInput.value = '';
            loading.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            const lowerText = text.toLowerCase();

            // 🚀 Multi-AI Routing Logic: Ultra HD Flux Image Generator (Bypasses Render Backend) 🚀
            if (lowerText.includes("image") || lowerText.includes("photo") || lowerText.includes("picture") || lowerText.includes("draw")) {
                // Generates high-quality 1024x1024 images instantly using the Flux model
                const imageUrl = `https://image.pollinations.ai/p/${encodeURIComponent(text)}?model=flux&width=1024&height=1024`;
                
                // Simulated slight delay to make the loader look smooth
                setTimeout(() => {
                    loading.style.display = 'none';
                    appendImageMessage(imageUrl);
                    if(!isMuted) {
                        const speech = new SpeechSynthesisUtterance("Here is the masterpiece you requested!");
                        speech.lang = 'en-US'; 
                        window.speechSynthesis.speak(speech);
                    }
                }, 1500);
                return; // Ends execution here so it doesn't call the text backend
            }

            // 🧠 Text Response via Render Backend Server (Groq / Gemini)
            try {
                const response = await fetch(`${RENDER_BACKEND_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                loading.style.display = 'none';
                appendMessage(data.reply, false);
                
                // Voice response if sound is on
                if(!isMuted) {
                    const speech = new SpeechSynthesisUtterance(data.reply); 
                    speech.lang = 'en-US'; 
                    window.speechSynthesis.speak(speech);
                }

            } catch (error) {
                loading.style.display = 'none';
                appendMessage("Server connection error! Please check your Render backend link or try again in a few moments.", false);
            }
        }
    </script>
</body>
</html>

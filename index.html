<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-THVBCNML2P"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link class="favicon" rel="icon" type="image/png" href="111.png">
    <title>s ai Pro - World's Most Private AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;600;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        
        /* 🚀 Bulletproof Mobile Layout Fix */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }
        
        body { 
            position: absolute; /* Locks the body exactly to screen size */
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('1.webp') no-repeat center center fixed; 
            background-size: cover;
            color: #ffffff; 
            display: flex; 
            flex-direction: column; 
            transition: background 0.3s ease-in-out;
        }
        
        @media (max-width: 768px) {
            body { background: url('0.webp') no-repeat center center fixed; background-size: cover; }
        }
        
        /* Ribbon */
        .top-ribbon {
            flex: 0 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            z-index: 10;
        }
        .ribbon-left, .ribbon-right { display: flex; align-items: center; gap: 10px; }
        .brand-name { color: #a072ff; font-weight: bold; font-size: 15px; letter-spacing: 1px;}
        
        select, .ribbon-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 4px 10px;
            border-radius: 15px;
            outline: none;
            cursor: pointer;
            font-size: 12px;
            transition: 0.3s;
        }
        select:hover, .ribbon-btn:hover { background: #6f42c1; }
        select option { background: #1a1a1a; color: white; }
        .privacy-link { color: #ccc; text-decoration: none; font-size: 12px; }
        .privacy-link:hover { color: #a072ff; text-decoration: underline; }

        /* Chat Container */
        .chat-container { 
            flex: 1 1 auto; /* Allows chat to take available space */
            overflow-y: auto; 
            height: 0; /* Critical for flex scrolling */
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background: rgba(11, 15, 25, 0.4); 
        }
        .message { max-width: 80%; padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-wrap: break-word; }
        .user-msg { background: linear-gradient(135deg, #533190 0%, #3e1e75 100%); align-self: flex-end; border-bottom-right-radius: 4px; }
        .ai-msg { background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.1); align-self: flex-start; border-bottom-left-radius: 4px; backdrop-filter: blur(5px); }
        .typing-indicator { display: none; align-self: flex-start; padding: 12px 18px; background: rgba(0, 0, 0, 0.6); border-radius: 15px; color: #a072ff; font-size: 14px; font-weight: 600; border-bottom-left-radius: 4px; border: 1px solid rgba(160, 114, 255, 0.2); }
        
        /* Weather Card */
        .weather-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.03));
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 16px;
            padding: 15px 20px;
            margin-top: 5px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            max-width: 320px;
        }
        .weather-city { font-size: 18px; font-weight: 600; color: #a072ff; text-transform: capitalize; margin-bottom: 2px; }
        .weather-condition { font-size: 14px; color: #ddd; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
        .weather-temp { font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 5px; }
        .weather-details { font-size: 11px; color: #aaa; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 6px; display: flex; justify-content: space-between; }

        /* Prompts Grid */
        .welcome-box { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: auto; text-align: center; max-width: 600px; padding: 20px; }
        .welcome-box h2 { font-size: 24px; color: #a072ff; margin-bottom: 10px; }
        .welcome-box p { font-size: 14px; color: #ccc; margin-bottom: 20px; }
        .prompt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
        .prompt-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #fff; padding: 14px; border-radius: 12px; cursor: pointer; font-size: 13px; transition: 0.3s; text-align: left; display: flex; align-items: center; gap: 8px; }
        .prompt-btn:hover { background: rgba(111, 66, 193, 0.3); border-color: #6f42c1; }

        /* Preview Area */
        .preview-container { flex: 0 0 auto; display: none; padding: 5px 20px; background: rgba(0, 0, 0, 0.8); align-items: center; gap: 10px; }
        .image-preview { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; border: 1px solid #a072ff; }
        .cancel-img-btn { background: #ff4d4d; color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 11px; display: flex; align-items: center; justify-content: center; }

        /* 🔥 Input Area (Fixed visibility issue) 🔥 */
        .input-area { 
            flex: 0 0 auto; /* Forces it to stay at the bottom, never shrink */
            display: flex; 
            padding: 15px 20px; 
            background: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(10px); 
            gap: 10px; 
            align-items: center; 
            width: 100%;
            z-index: 100;
        }
        .input-area input[type="text"] { flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; padding: 15px; border-radius: 25px; outline: none; font-size: 15px; }
        .input-area input[type="text"]:focus { border-color: #6f42c1; background: rgba(255, 255, 255, 0.1); }
        .icon-btn { background: none; border: none; color: #a072ff; font-size: 22px; cursor: pointer; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .icon-btn:hover { background: #6f42c1; color: white; }
        
        #file-input { display: none; }
    </style>
</head>
<body>

    <div class="top-ribbon">
        <div class="ribbon-left">
            <span class="brand-name">s ai Pro</span>
            <select id="theme-selector">
                <option value="default">🌌 Default Theme</option>
                <option value="hacker">💻 Hacker Mode</option>
                <option value="dark">🌙 Dark Mode</option>
            </select>
        </div>
        <div class="ribbon-right">
            <button id="clear-btn" class="ribbon-btn">🗑️ Clear</button>
            <button id="mute-btn" class="ribbon-btn">🔊 Sound On</button>
        </div>
    </div>
    
    <div class="chat-container" id="chat-box">
        <div class="welcome-box" id="welcome-screen">
            <div class="prompt-grid">
                <button class="prompt-btn" onclick="quickPrompt('Draw a realistic high quality cat')">🎨 Draw a Cat</button>
                <button class="prompt-btn" onclick="quickPrompt('weather in kolkata')">🌡️ Today's Weather</button>
                <button class="prompt-btn" onclick="quickPrompt('Show me live football scores')">⚽ Live Football Score</button>
                <button class="prompt-btn" onclick="quickPrompt('Help me learn HTML')">📚 Help me Learning</button>
            </div>
        </div>
        <div class="typing-indicator" id="loading">s ai Pro thinking... ⚡</div>
    </div>

    <div class="preview-container" id="preview-box">
        <img src="" id="img-preview-src" class="image-preview">
        <span style="font-size: 12px; color: #ccc;">Ready to upload</span>
        <button class="cancel-img-btn" id="cancel-img-btn">✕</button>
    </div>

    <div class="input-area">
        <input type="file" id="file-input" accept="image/*">
        <button class="icon-btn" id="upload-btn" title="Upload Image">📎</button>
        
        <input type="text" id="user-input" placeholder="Ask s ai Pro anything...">
        <button class="icon-btn" id="send-btn">➤</button>
    </div>

    <script>
        // 🚀 ONLY VERCEL API as requested! No more fallbacks.
        const API_URL = "https://shubhomoy-ai-bakend-sai-lol.vercel.app/api/chat";

        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const loading = document.getElementById('loading');
        const welcomeScreen = document.getElementById('welcome-screen');
        const clearBtn = document.getElementById('clear-btn');
        
        const uploadBtn = document.getElementById('upload-btn');
        const fileInput = document.getElementById('file-input');
        const previewBox = document.getElementById('preview-box');
        const imgPreviewSrc = document.getElementById('img-preview-src');
        const cancelImgBtn = document.getElementById('cancel-img-btn');

        let selectedImageBase64 = null;
        let isMuted = false;

        document.getElementById('theme-selector').addEventListener('change', function() {
            if(this.value === 'default') {
                document.body.style.background = "url('1.webp') no-repeat center center fixed";
                document.body.style.backgroundSize = "cover";
            } else if(this.value === 'hacker') {
                document.body.style.background = "#0d1117";
            } else if(this.value === 'dark') {
                document.body.style.background = "#000000";
            }
        });

        const muteBtn = document.getElementById('mute-btn');
        muteBtn.addEventListener('click', () => {
            isMuted = !isMuted;
            muteBtn.innerText = isMuted ? "🔇 Muted" : "🔊 Sound On";
            if(isMuted && 'speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
        });

        clearBtn.addEventListener('click', () => {
            const messages = chatBox.querySelectorAll('.message, .weather-card');
            messages.forEach(msg => msg.remove());
            welcomeScreen.style.display = 'flex';
        });

        uploadBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    selectedImageBase64 = e.target.result;
                    imgPreviewSrc.src = e.target.result;
                    previewBox.style.display = 'flex';
                }
                reader.readAsDataURL(file);
            }
        });

        cancelImgBtn.addEventListener('click', () => {
            selectedImageBase64 = null;
            fileInput.value = '';
            previewBox.style.display = 'none';
        });

        userInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); sendMessage(); } });
        sendBtn.addEventListener('click', () => { sendMessage(); });

        function quickPrompt(promptText) {
            userInput.value = promptText;
            sendMessage();
        }

        function appendMessage(text, isUser) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
            chatBox.insertBefore(msgDiv, loading);
            chatBox.scrollTop = chatBox.scrollHeight;

            if (isUser) {
                msgDiv.innerText = text;
            } else {
                let i = 0;
                msgDiv.innerText = '';
                function typeWriter() {
                    if (i < text.length) {
                        msgDiv.style.whiteSpace = 'pre-wrap'; 
                        msgDiv.innerText += text.charAt(i);
                        i++;
                        chatBox.scrollTop = chatBox.scrollHeight;
                        setTimeout(typeWriter, 12);
                    }
                }
                typeWriter();
            }
        }

        function appendImageMessage(imageUrl, isUser = false) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${isUser ? 'user-msg' : 'ai-msg'}`;
            msgDiv.innerHTML = `<img src="${imageUrl}" style="max-width:100%; max-height:250px; border-radius:10px; display:block; border: 2px solid #a072ff;">`;
            chatBox.insertBefore(msgDiv, loading);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function safeSpeak(text) {
            if(!isMuted && 'speechSynthesis' in window) {
                try {
                    const speech = new SpeechSynthesisUtterance(text);
                    speech.lang = 'en-US'; 
                    window.speechSynthesis.speak(speech);
                } catch(e) { console.log("Speech error"); }
            }
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && !selectedImageBase64) return;

            welcomeScreen.style.display = 'none';

            if (selectedImageBase64) {
                appendImageMessage(selectedImageBase64, true);
            }
            if (text) {
                appendMessage(text, true);
            }

            userInput.value = '';
            loading.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            const lowerText = text.toLowerCase();

            // Image Check
            if (!selectedImageBase64 && (lowerText.includes("image") || lowerText.includes("draw"))) {
                const imageUrl = `https://image.pollinations.ai/p/${encodeURIComponent(text)}?model=flux&width=1024&height=1024`;
                setTimeout(() => {
                    loading.style.display = 'none';
                    appendImageMessage(imageUrl, false);
                }, 1500);
                return;
            }

            // Chat API Call
            try {
                const payload = { message: text };
                if (selectedImageBase64) {
                    payload.image = selectedImageBase64;
                }

                selectedImageBase64 = null;
                fileInput.value = '';
                previewBox.style.display = 'none';

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    loading.style.display = 'none';
                    appendMessage(data.reply, false);
                    safeSpeak(data.reply);
                } else {
                    throw new Error("Server error");
                }
                
            } catch (err) {
                loading.style.display = 'none';
                appendMessage("Vercel Server Error! Check if your backend is running properly.", false);
            }
        }
    </script>
</body>
</html>
